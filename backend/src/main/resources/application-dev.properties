# ============================================================================
# Development Profile
# ============================================================================

# Loads backend/.env (KEY=VALUE, same syntax as .properties) when present.
# "optional:" means startup doesn't fail if the file is missing. Two candidate
# paths are listed because the working directory differs by how the app is run:
# - ./mvnw spring-boot:run (from backend/)        → cwd = backend/        → .env
# - IDE run configs (IntelliJ defaults to project root) → cwd = project root → backend/.env
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5432/menubank_dev
spring.datasource.username=menubank
spring.datasource.password=menubank
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=false

# Local auth provider (dev only): identities created by the dev auth endpoints use
# this provider name, which AuthHelper resolves against. Prod keeps the default "supabase".
app.auth.provider=local

# Anota.AI integration (mock servers para desenvolvimento)
anotaai.orders-base-url=https://api-parceiros.anota.ai
anotaai.menu-base-url=https://api-menu.anota.ai

# Billing (dev only): auto-assign this plan on sign-up so a new account is
# immediately usable without going through checkout. The plan row is seeded by
# BasicPlanSeeder. Prod deliberately leaves this unset, which keeps new accounts
# on plan=null/PENDING and forces them through the regular billing flow.
# The value is "Básico": .properties files are read as ISO-8859-1, so the accent
# must be escaped or the name silently stops matching the seeded plan.
app.billing.default-plan-name=B\u00e1sico

# AbacatePay integration
abacatepay.api-key=${ABACATEPAY_API_KEY:}
abacatepay.base-url=${ABACATEPAY_BASE_URL:https://api.abacatepay.com/v2}
abacatepay.webhook-secret=${ABACATEPAY_WEBHOOK_SECRET:}

# Frontend base URL (used to build checkout return/completion URLs)
app.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}

# iFood integration
ifood.connection-enabled=${IFOOD_CONNECTION_ENABLED:true}
ifood.client-id=${IFOOD_CLIENT_ID:}
ifood.client-secret=${IFOOD_CLIENT_SECRET:}
ifood.auth-base-url=https://merchant-api.ifood.com.br/authentication/v1.0
ifood.order-base-url=https://merchant-api.ifood.com.br/order/v1.0
ifood.catalog-base-url=https://merchant-api.ifood.com.br/catalog/v2.0
