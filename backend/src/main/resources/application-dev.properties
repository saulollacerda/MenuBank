# ============================================================================
# Development Profile
# ============================================================================

# Loads backend/.env (KEY=VALUE, same syntax as .properties) when present.
# "optional:" means startup doesn't fail if the file is missing. Two candidate
# paths are listed because the working directory differs by how the app is run:
# - ./mvnw spring-boot:run (from backend/)        → cwd = backend/        → .env
# - IDE run configs (IntelliJ defaults to project root) → cwd = project root → backend/.env
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5432/menubank_dev
spring.datasource.username=menubank
spring.datasource.password=menubank
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=false

# Local auth provider (dev only): identities created by the dev auth endpoints use
# this provider name, which AuthHelper resolves against. Prod keeps the default "supabase".
app.auth.provider=local

# Anota.AI integration (mock servers para desenvolvimento)
anotaai.orders-base-url=https://api-parceiros.anota.ai
anotaai.menu-base-url=https://api-menu.anota.ai

# iFood integration
ifood.client-id=${IFOOD_CLIENT_ID:}
ifood.client-secret=${IFOOD_CLIENT_SECRET:}
ifood.auth-base-url=https://merchant-api.ifood.com.br/authentication/v1.0
