# ============================================================================
# Development Profile
# ============================================================================
# Sobrescreve a base para desenvolvimento

spring.datasource.url=jdbc:postgresql://localhost:5432/menubank_dev
spring.datasource.username=menubank_dev_user
spring.datasource.password=dev_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicitly set Hibernate dialect (PostgreSQL)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (kept for fallback)
spring.h2.console.enabled=false