# ============================================================================
# Production Profile (with PostgreSQL)
# ============================================================================

# Port (Railway injects a dynamic $PORT)
server.port=${PORT:8080}

# Conexão com Supabase (use o Session Pooler em IPv4: aws-0-<region>.pooler.supabase.com:5432)
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (Flyway cria o schema; Hibernate apenas valida)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway (migrations versionadas em db/migration)
spring.flyway.enabled=true

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Supabase Auth (JWKS asimétrico)
supabase.issuer-uri=${SUPABASE_ISSUER_URI}
supabase.audience=${SUPABASE_AUDIENCE:authenticated}

# Logging
logging.level.root=INFO
logging.level.com.MenuBank.MenuBank=INFO

# Anota.AI integration
anotaai.orders-base-url=${ANOTAAI_ORDERS_BASE_URL:https://api-parceiros.anota.ai}
anotaai.menu-base-url=${ANOTAAI_MENU_BASE_URL:https://api-menu.anota.ai}

# AbacatePay integration
abacatepay.api-key=${ABACATEPAY_API_KEY}
abacatepay.base-url=${ABACATEPAY_BASE_URL:https://api.abacatepay.com/v2}
abacatepay.webhook-secret=${ABACATEPAY_WEBHOOK_SECRET}

# Frontend base URL (used to build checkout return/completion URLs)
app.frontend-base-url=${APP_FRONTEND_BASE_URL}

# iFood integration
# Connection flow stays blocked in prod until iFood homologation passes;
# flip IFOOD_CONNECTION_ENABLED=true (Railway dashboard) to release it without a deploy.
ifood.connection-enabled=${IFOOD_CONNECTION_ENABLED:false}
ifood.client-id=${IFOOD_CLIENT_ID}
ifood.client-secret=${IFOOD_CLIENT_SECRET}
ifood.auth-base-url=${IFOOD_AUTH_BASE_URL:https://merchant-api.ifood.com.br/authentication/v1.0}
ifood.order-base-url=${IFOOD_ORDER_BASE_URL:https://merchant-api.ifood.com.br/order/v1.0}
ifood.catalog-base-url=${IFOOD_CATALOG_BASE_URL:https://merchant-api.ifood.com.br/catalog/v2.0}

