# ============================================================================
# Production Profile (with PostgreSQL)
# ============================================================================

# Database (PostgreSQL via Docker)
spring.datasource.url=jdbc:postgresql://${DB_HOST:${PGHOST:localhost}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE}}
spring.datasource.username=${DB_USER:${PGUSER}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Logging
logging.level.root=INFO
logging.level.com.MenuBank.MenuBank=INFO

# Anota.AI integration
anotaai.orders-base-url=${ANOTAAI_ORDERS_BASE_URL:https://api-parceiros.anota.ai}
anotaai.menu-base-url=${ANOTAAI_MENU_BASE_URL:https://api-menu.anota.ai}