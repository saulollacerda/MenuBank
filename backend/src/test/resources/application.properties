# ============================================================================
# Test Profile (used by Maven Surefire)
# ============================================================================

spring.profiles.active=test

spring.datasource.url=jdbc:postgresql://localhost:5432/menubank_test
spring.datasource.username=menubank
spring.datasource.password=menubank
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Tests manage the schema via Hibernate create-drop; Flyway stays off.
spring.flyway.enabled=false

spring.h2.console.enabled=false

# AbacatePay integration — dummy values so the Spring context loads in tests
# (HTTP calls are always mocked; no real request reaches these hosts)
abacatepay.api-key=test-api-key
abacatepay.base-url=http://localhost:59999/v2
abacatepay.webhook-secret=test-webhook-secret
app.frontend-base-url=http://localhost:5173

# iFood integration — dummy values so the Spring context loads in tests
# (HTTP calls are always mocked; no real request reaches these hosts)
ifood.client-id=test-client-id
ifood.client-secret=test-client-secret
ifood.auth-base-url=http://localhost:59999/authentication/v1.0
ifood.order-base-url=http://localhost:59999/order/v1.0
ifood.catalog-base-url=http://localhost:59999/catalog/v2.0
