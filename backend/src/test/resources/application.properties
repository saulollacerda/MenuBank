# ============================================================================
# Test Profile (used by Maven Surefire)
# ============================================================================
# IMPORTANT: production code defaults to 'dev' profile, but tests must never
# connect to a developer's local PostgreSQL.

spring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:menubank_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.h2.console.enabled=false

