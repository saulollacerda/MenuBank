server {
  listen ${PORT};
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Hashed assets (JS/CSS/images under /assets/) — cache 1 year, immutable.
  # Safe because Vite embeds a content hash in every filename.
  location ^~ /assets/ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # index.html — must revalidate on every load so users always get the latest app.
  location = /index.html {
    add_header Cache-Control "public, max-age=0, must-revalidate";
  }

  # Proxy API requests to the backend (BACKEND_URL injected via envsubst at startup).
  # Never cache API responses in nginx.
  location /api/ {
    proxy_pass ${BACKEND_URL}/api/;
    proxy_http_version 1.1;

    proxy_ssl_server_name on;

    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header Cache-Control "private, no-cache, no-store, must-revalidate";
  }

  # Vue SPA routing: always fallback to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}

