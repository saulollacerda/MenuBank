services:
  db:
    image: postgres:16
    container_name: menubank_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: menubank
      POSTGRES_PASSWORD: menubank
      POSTGRES_DB: menubank_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
